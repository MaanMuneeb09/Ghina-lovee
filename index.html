<div class="overlay px-10">
    <div id="ui-container" class="max-w-2xl text-center">
        <h1 id="main-title" class="text-5xl md:text-7xl font-serif mb-6 opacity-0">Ghina</h1>
        
        <div id="options-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4 opacity-0 scale-95">
            <button onclick="revealMessage(1)" class="option-card">Our First Moment</button>
            <button onclick="revealMessage(2)" class="option-card">Why It's Always You</button>
            <button onclick="revealMessage(3)" class="option-card">My Promise to You</button>
            <button onclick="revealMessage(4)" class="option-card">To My Habibi</button>
        </div>

        <div id="story-text" class="mt-10 text-xl italic font-light leading-relaxed min-h-[100px]"></div>
        
        <button id="start-experience" class="mt-8 px-10 py-4 border border-pink-400 rounded-full hover:bg-pink-500/20 transition-all">
            Enter Our World
        </button>
    </div>
</div>

<style>
    .option-card {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 182, 193, 0.3);
        padding: 15px;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        pointer-events: all;
    }
    .option-card:hover {
        background: rgba(255, 105, 180, 0.2);
        border-color: #ff69b4;
        transform: translateY(-5px);
    }
    .typing-cursor::after {
        content: "|";
        animation: blink 0.7s infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }
</style>

<script>
    // --- (Keep your existing Three.js setup from the previous response here) ---

    const messages = {
        1: "Since the day I met you, Ghina, my world changed its orbit. Every second with you feels like a masterpiece.",
        2: "It’s the way you laugh, the way you speak, and the way you make the hardest days feel easy. You are my peace.",
        3: "I promise to be your strength when you are tired, and your biggest fan when you shine. Forever isn't long enough.",
        4: "أنتِ أجمل ما حدث لي (You are the most beautiful thing that happened to me). My heart belongs to you, always."
    };

    const startBtn = document.getElementById('start-experience');
    const song = document.getElementById('love-song');

    startBtn.addEventListener('click', () => {
        song.play();
        gsap.to(startBtn, { opacity: 0, pointerEvents: 'none', duration: 0.5 });
        gsap.to("#main-title", { opacity: 1, y: -20, duration: 1.5, ease: "power2.out" });
        gsap.to("#options-grid", { opacity: 1, scale: 1, duration: 1, delay: 0.5, ease: "back.out" });
        
        // Dynamic 3D Shift
        gsap.to(camera.position, { z: 4, duration: 3 });
    });

    function revealMessage(id) {
        const display = document.getElementById('story-text');
        const text = messages[id];
        
        // Reset and Animate Camera on Click
        gsap.to(camera.rotation, { 
            y: camera.rotation.y + Math.PI * 0.5, 
            duration: 2, 
            ease: "power2.inOut" 
        });

        // Typewriter Effect
        display.innerHTML = "";
        display.classList.add('typing-cursor');
        let i = 0;
        
        function type() {
            if (i < text.length) {
                display.innerHTML += text.charAt(i);
                i++;
                setTimeout(type, 40);
            }
        }
        type();
    }
</script>
