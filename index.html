<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Ghina ❤️</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a0a; font-family: 'Georgia', serif; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .overlay { 
            position: absolute; z-index: 10; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; pointer-events: none; color: white;
            text-shadow: 0 0 20px rgba(255,20,147,0.8);
        }
        #play-btn {
            pointer-events: all;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: 0.3s;
        }
        #play-btn:hover { background: rgba(255, 105, 180, 0.4); transform: scale(1.1); }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="overlay">
        <h1 id="main-title" class="text-6xl md:text-8xl font-bold mb-4 opacity-0">Ghina</h1>
        <p id="sub-title" class="text-xl md:text-2xl italic opacity-0">My heart, my soul, my everything.</p>
        <button id="play-btn" class="mt-8 px-8 py-3 rounded-full text-lg uppercase tracking-widest">Open My Heart</button>
    </div>

    <audio id="love-song" loop>
        <source src="YOUR_ARABIC_SONG_LINK_HERE.mp3" type="audio/mpeg">
    </audio>

    <script>
        // --- 3D Scene Setup ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0xff69b4, 2);
        pointLight.position.set(5, 5, 5);
        scene.add(pointLight);

        // --- Creating "Flowers" (Abstract 3D Hearts/Petals) ---
        const particlesGeometry = new THREE.BufferGeometry();
        const count = 1500;
        const positions = new Float32Array(count * 3);
        
        for(let i = 0; i < count * 3; i++) {
            positions[i] = (Math.random() - 0.5) * 15;
        }
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        
        const particlesMaterial = new THREE.PointsMaterial({
            size: 0.05,
            color: 0xff1493,
            transparent: true,
            blending: THREE.AdditiveBlending
        });

        const particleMesh = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particleMesh);

        camera.position.z = 5;

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            particleMesh.rotation.y += 0.002;
            particleMesh.rotation.x += 0.001;
            renderer.render(scene, camera);
        }
        animate();

        // --- Interaction & GSAP Animations ---
        const playBtn = document.getElementById('play-btn');
        const song = document.getElementById('love-song');

        playBtn.addEventListener('click', () => {
            song.play();
            
            // Pro-level transition sequence
            gsap.to(playBtn, { duration: 1, opacity: 0, y: -50, ease: "power4.in" });
            gsap.to("#main-title", { duration: 2, opacity: 1, y: 0, delay: 0.5, ease: "back.out(1.7)" });
            gsap.to("#sub-title", { duration: 2, opacity: 1, delay: 1.2 });
            
            // Zoom the camera in slowly for cinematic effect
            gsap.to(camera.position, { duration: 10, z: 2, ease: "sine.inOut" });
            
            // Change particle colors dynamically
            gsap.to(particlesMaterial.color, { duration: 5, r: 1, g: 0.4, b: 0.7, repeat: -1, yoyo: true });
        });

        // Handle Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
