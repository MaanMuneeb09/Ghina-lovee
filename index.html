<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Ghina ❤️</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial;
}

body {
    height: 100vh;
    overflow: hidden;
    background: linear-gradient(270deg, #ff6b81, #ff9ff3, #feca57);
    background-size: 600% 600%;
    animation: gradient 10s ease infinite;
    display: flex;
    justify-content: center;
    align-items: center;
}

@keyframes gradient {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* START SCREEN */
#startScreen {
    position: absolute;
    width: 100%;
    height: 100%;
    background: black;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 10;
}

#startScreen h1 {
    font-size: 2.5em;
    margin-bottom: 20px;
}

#startBtn {
    padding: 15px 30px;
    font-size: 1.2em;
    border-radius: 10px;
    border: none;
    cursor: pointer;
}

/* MAIN CARD */
.card {
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.1);
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    color: white;
    box-shadow: 0 0 30px rgba(0,0,0,0.3);
    animation: fadeIn 1.5s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: scale(0.9);}
    to {opacity: 1; transform: scale(1);}
}

h1 {
    font-size: 2.5em;
    margin-bottom: 15px;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from {text-shadow: 0 0 10px white;}
    to {text-shadow: 0 0 30px pink;}
}

button {
    margin: 10px;
    padding: 12px 20px;
    font-size: 1.1em;
    border-radius: 10px;
    border: none;
    cursor: pointer;
}

.yes { background: white; color: #ff4d6d; }
.no { background: #ff4d6d; color: white; }

/* FLOATING HEARTS */
.heart {
    position: absolute;
    width: 15px;
    height: 15px;
    background: pink;
    transform: rotate(45deg);
    animation: float 6s linear infinite;
}

.heart::before,
.heart::after {
    content: "";
    width: 15px;
    height: 15px;
    background: pink;
    border-radius: 50%;
    position: absolute;
}

.heart::before { top: -7px; left: 0; }
.heart::after { left: -7px; top: 0; }

@keyframes float {
    0% { transform: translateY(100vh) rotate(45deg); opacity: 1;}
    100% { transform: translateY(-10vh) rotate(45deg); opacity: 0;}
}
</style>
</head>

<body>

<!-- START SCREEN -->
<div id="startScreen">
    <h1>For Ghina ❤️</h1>
    <button id="startBtn" onclick="start()">Tap to open 💖</button>
</div>

<!-- MAIN CONTENT -->
<div class="card" id="mainContent" style="display:none;">
    <h1>I love you, Ghina ❤️</h1>
    <p>You mean everything to me.</p>
    <p>I love you so much 💖</p>

    <div id="question">
        <p>Do you love me back?</p>
        <button class="yes" onclick="yes1()">Yes</button>
        <button class="no" onclick="no1()">No</button>
    </div>
</div>

<audio id="music" loop>
    <source src="https://cdn.pixabay.com/download/audio/2023/03/14/audio_6b1e6f88d6.mp3?filename=arabic-romantic-141997.mp3">
</audio>

<script>
function start() {
    document.getElementById("startScreen").style.display = "none";
    document.getElementById("mainContent").style.display = "block";
    document.getElementById("music").play();
}

function yes1() {
    document.getElementById("question").innerHTML =
    "<p>I knew it 😌❤️</p>";
}

function no1() {
    document.getElementById("question").innerHTML =
    "<p>Are you sure Ghina? 🥺</p>\
    <button class='yes' onclick='yes2()'>Yes</button>\
    <button class='no' onclick='no2()'>No</button>";
}

function yes2() {
    document.getElementById("question").innerHTML =
    "<p>Think again 😭❤️</p>\
    <button class='yes' onclick='finalYes()'>Yes</button>\
    <button class='yes' onclick='finalYes()'>Obviously</button>";
}

function no2() {
    document.getElementById("question").innerHTML =
    "<p>I’ll take that as a yes 😌❤️</p>";
}

function finalYes() {
    document.getElementById("question").innerHTML =
    "<h2>❤️ I LOVE YOU SO MUCH GHINA ❤️</h2>";
}

function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
}

setInterval(createHeart, 200);
</script>

</body>
</html>
